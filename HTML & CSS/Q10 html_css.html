<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Drop Cap Example</title>
  <style>
    body {
      font-family: Georgia, serif;
      background-color: #f2f2f2;
      padding: 40px;
      max-width: 580px;
    }

    .drop-cap {
      font-size: 4em;
      float: left;
      line-height: 0.8;
      padding-right: 10px;
      font-weight: bold;
    }

    .text-block {
      width: 60%;
      background-color: #fff;
      padding: 20px;
      font-size: 1.5em;
      line-height: 1.4;
    }
  </style>
</head>
<body>

  <div class="text-block">
    <span class="drop-cap">D</span>rop caps can be used to add emphasis to blocks of text but know they can affect readability.
  </div>

</body>
</html>
