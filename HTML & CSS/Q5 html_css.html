<!DOCTYPE html>
<html>
<head>
  <style>
    /* Apply box model styling to all divs */
    div {
      padding: 20px;           /* Space inside the box */
      margin: 15px;            /* Space outside the box */
      border: 2px solid black; /* Border around the box */
      box-sizing: border-box;  /* Includes padding & border in width/height */
    }
  </style>
</head>
<body>

  <div>This is the first box.</div>
  <div>This is the second box.</div>

</body>
</html>
