<!DOCTYPE html>
<html>
<head>
  <style>
    .move-box {
      width: 150px;
      height: 100px;
      background-color: coral;
      color: white;
      text-align: center;
      line-height: 100px;
      font-family: sans-serif;
      transition: transform 0.5s; /* Smooth movement */
    }

    /* On hover, move the box using translate */
    .move-box:hover {
      transform: translate(50px, 30px); /* Move right 50px, down 30px */
    }
  </style>
</head>
<body>

  <div class="move-box">Hover Me</div>

</body>
</html>
