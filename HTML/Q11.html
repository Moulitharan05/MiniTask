<!DOCTYPE html>
<html>
<head>
  <title>All Input Types Example</title>
</head>
<body>

  <h2>HTML Form with All Input Types</h2>

  <form>
    <!-- Text -->
    Text: <input type="text" value="Hello"><br><br>

    <!-- Password -->
    Password: <input type="password" value="123456"><br><br>

    <!-- Email -->
    Email: <input type="email" value="user@example.com"><br><br>

    <!-- Number -->
    Number: <input type="number" value="42"><br><br>

    <!-- Date -->
    Date: <input type="date" value="2025-08-04"><br><br>

    <!-- Time -->
    Time: <input type="time" value="14:30"><br><br>

    <!-- Month -->
    Month: <input type="month" value="2025-08"><br><br>

    <!-- Week -->
    Week: <input type="week" value="2025-W32"><br><br>

    <!-- URL -->
    Website: <input type="url" value="https://example.com"><br><br>

    <!-- Tel -->
    Phone: <input type="tel" value="9876543210"><br><br>

    <!-- Search -->
    Search: <input type="search" value="HTML"><br><br>

    <!-- Color -->
    Color: <input type="color" value="#ff6600"><br><br>

    <!-- File -->
    Upload File: <input type="file"><br><br>

    <!-- Checkbox -->
    <label><input type="checkbox" checked> Option 1</label>
    <label><input type="checkbox"> Option 2</label><br><br>

    <!-- Radio -->
    <label><input type="radio" name="choice" checked> Choice A</label>
    <label><input type="radio" name="choice"> Choice B</label><br><br>

    <!-- Range -->
    Range: <input type="range" min="0" max="100" value="50"><br><br>

    <!-- Hidden -->
    <input type="hidden" value="hiddenValue123">

    <!-- Submit -->
    <input type="submit" value="Submit"><br><br>

    <!-- Reset -->
    <input type="reset" value="Reset"><br><br>

    <!-- Button -->
    <input type="button" value="Click Me"><br><br>

    <!-- Image button -->
    Image Button: <input type="image" src="https://via.placeholder.com/50" alt="Submit" width="50" height="50"><br><br>

    <!-- Textarea -->
    Message:<br>
    <textarea rows="4" cols="30">Enter your message here</textarea><br><br>

    <!-- Select -->
    Choose:
    <select>
      <option selected>Option 1</option>
      <option>Option 2</option>
      <option>Option 3</option>
    </select><br><br>

    <!-- Multiple Select -->
    Choose multiple:
    <select multiple>
      <option selected>One</option>
      <option>Two</option>
      <option selected>Three</option>
    </select><br><br>

  </form>

</body>
</html>
