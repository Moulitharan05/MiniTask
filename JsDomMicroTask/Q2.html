<body>

    <button onclick="getValue()">Enter Value</button>

    <p>Your input: <span id="result"></span></p>

    <script>
        function getValue() {
            let userInput = prompt("Enter something:");
            document.getElementById("result").textContent = userInput;
        }
    </script>
