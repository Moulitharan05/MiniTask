<!DOCTYPE html>
<html>
<body>

<h3>Press any key</h3>

<script>
document.addEventListener("keydown", function(event) {
    if (event.code === "Space") {
        alert("Thank You..!!");
        window.close();
    } else {
        alert("Invalid Key Pressed");
    }
});
</script>

</body>
</html>
